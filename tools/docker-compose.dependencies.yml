services:
  peoplemesh:
    image: ${PEOPLEMESH_IMAGE:-frapax/peoplemesh:latest}
    container_name: peoplemesh-app
    restart: unless-stopped
    depends_on:
      - postgres
      - ollama
      - docling
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/peoplemesh
      DB_USER: peoplemesh
      DB_PASSWORD: change-me
      OLLAMA_BASE_URL: http://ollama:11434
      DOCLING_URL: http://docling:5001
      CONSENT_TOKEN_SECRET: ${CONSENT_TOKEN_SECRET:-replace-with-32-plus-bytes}
      SESSION_SECRET: ${SESSION_SECRET:-replace-with-32-plus-bytes}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET:-replace-with-32-plus-bytes}
      MAINTENANCE_API_KEY: ${MAINTENANCE_API_KEY:-replace-with-strong-shared-key}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      PEOPLEMESH_FRONTEND_ENABLED: ${PEOPLEMESH_FRONTEND_ENABLED:-true}
      OIDC_GOOGLE_CLIENT_ID: ${OIDC_GOOGLE_CLIENT_ID:-}
      OIDC_GOOGLE_CLIENT_SECRET: ${OIDC_GOOGLE_CLIENT_SECRET:-}
      OIDC_MICROSOFT_CLIENT_ID: ${OIDC_MICROSOFT_CLIENT_ID:-}
      OIDC_MICROSOFT_CLIENT_SECRET: ${OIDC_MICROSOFT_CLIENT_SECRET:-}

  postgres:
    image: pgvector/pgvector:pg16
    container_name: peoplemesh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: peoplemesh
      POSTGRES_USER: peoplemesh
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peoplemesh -d peoplemesh"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - peoplemesh-postgres-data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: peoplemesh-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - peoplemesh-ollama-data:/root/.ollama

  docling:
    image: ${DOCLING_IMAGE:-ghcr.io/docling-project/docling-serve:latest}
    container_name: peoplemesh-docling
    restart: unless-stopped
    ports:
      - "5001:5001"

volumes:
  peoplemesh-postgres-data:
  peoplemesh-ollama-data:
