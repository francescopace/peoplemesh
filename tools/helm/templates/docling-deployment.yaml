{{- if .Values.docling.enabled }}
{{- $isDoclingCpuImage := contains "docling-serve-cpu" .Values.docling.image.repository }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "peoplemesh.fullname" . }}-docling
  labels:
    {{- include "peoplemesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: docling
spec:
  replicas: {{ .Values.docling.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: {{ include "peoplemesh.name" . }}
      app.kubernetes.io/component: docling
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/name: {{ include "peoplemesh.name" . }}
        app.kubernetes.io/component: docling
    spec:
      containers:
        - name: docling
          image: "{{ .Values.docling.image.repository }}:{{ .Values.docling.image.tag }}"
          imagePullPolicy: {{ .Values.docling.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.docling.service.port }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: {{ .Values.docling.resources.requests.cpu | quote }}
              memory: {{ .Values.docling.resources.requests.memory | quote }}
              {{- if and (not $isDoclingCpuImage) (hasKey .Values.docling.resources.requests "nvidia.com/gpu") }}
              nvidia.com/gpu: {{ index .Values.docling.resources.requests "nvidia.com/gpu" | quote }}
              {{- end }}
            limits:
              cpu: {{ .Values.docling.resources.limits.cpu | quote }}
              memory: {{ .Values.docling.resources.limits.memory | quote }}
              {{- if and (not $isDoclingCpuImage) (hasKey .Values.docling.resources.limits "nvidia.com/gpu") }}
              nvidia.com/gpu: {{ index .Values.docling.resources.limits "nvidia.com/gpu" | quote }}
              {{- end }}
      {{- with .Values.docling.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.docling.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.docling.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
