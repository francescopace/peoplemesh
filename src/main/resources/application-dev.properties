# =============================================================================
# PeopleMesh — Development Configuration
# =============================================================================

# Dev profile overrides only; defaults are in application.properties.

# -----------------------------------------------------------------------------
# HTTP
# -----------------------------------------------------------------------------
quarkus.http.port=8080

# -----------------------------------------------------------------------------
# Dev Services
# -----------------------------------------------------------------------------
# Dev Services — auto-start containers for local development
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.image-name=pgvector/pgvector:pg16
quarkus.docling.devservices.enabled=true
quarkus.flyway.locations=classpath:db/migration,classpath:db/dev
# Keycloak not needed — auth is direct OIDC with social providers
quarkus.keycloak.devservices.enabled=false

# -----------------------------------------------------------------------------
# LangChain4j (local dev)
# -----------------------------------------------------------------------------

# Disable OpenAI in dev
quarkus.langchain4j.openai.chat-model.enabled=false
quarkus.langchain4j.openai.embedding-model.enabled=false

# Explicit provider selection avoids ambiguous provider resolution at build time
quarkus.langchain4j.embedding-model.provider=ollama

# LangChain4j — Ollama/Qwen for local dev (native install, uses Metal GPU on Apple Silicon)
quarkus.langchain4j.ollama.devservices.enabled=false
quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.timeout=60s

quarkus.langchain4j.ollama.embedding-model.enabled=true
quarkus.langchain4j.ollama.embedding-model.model-id=qwen3-embedding:0.6b
quarkus.langchain4j.ollama.embedding-model.log-requests=false
quarkus.langchain4j.ollama.embedding-model.log-responses=false

quarkus.langchain4j.ollama.chat-model.enabled=true
quarkus.langchain4j.ollama.chat-model.model-id=granite4:3b
quarkus.langchain4j.ollama.chat-model.log-requests=true
quarkus.langchain4j.ollama.chat-model.log-responses=true
quarkus.langchain4j.ollama.chat-model.temperature=0.2
quarkus.langchain4j.ollama.chat-model.num-predict=512
quarkus.langchain4j.ollama.chat-model.format=json

# -----------------------------------------------------------------------------
# PeopleMesh (dev overrides)
# -----------------------------------------------------------------------------
# Entitlements — oauth_subject values granted specific entitlements on login
peoplemesh.entitlements.can-create-job=103122026977473599115
peoplemesh.entitlements.can-manage-skills=103122026977473599115

# Dev secrets (safe defaults for local development only)
peoplemesh.consent-token.secret=default-dev-consent-secret-change-in-prod-32b!
peoplemesh.session.secret=default-dev-session-secret-change-in-prod-32b!!
peoplemesh.oauth.state-secret=default-dev-oauth-state-secret-change-prod-32b!

# Maintenance API key — auto-use dev-local-maintenance-key for localhost
peoplemesh.maintenance.api-key=dev-local-maintenance-key