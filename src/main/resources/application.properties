#quarkus.langchain4j.openai.chat-model.response-format=json_object
#quarkus.langchain4j.openai.timeout=20s

# -----------------------------------------------------------------------------
# Docling / CV Import
# -----------------------------------------------------------------------------
# Canonical key used by quarkus-docling.
%prod.quarkus.docling.base-url=${DOCLING_BASE_URL:http://docling:5001}
quarkus.docling.timeout=60s
peoplemesh.cv-import.max-file-size=5242880

# -----------------------------------------------------------------------------
# PeopleMesh — Domain Configuration
# -----------------------------------------------------------------------------

# Frontend static serving
peoplemesh.frontend.enabled=${PEOPLEMESH_FRONTEND_ENABLED:false}
peoplemesh.frontend.dir=${PEOPLEMESH_FRONTEND_DIR:src/main/web}

# Common app security tokens/secrets
peoplemesh.problems.base-uri=${PROBLEMS_BASE_URI:about:blank}
peoplemesh.consent-token.secret=${CONSENT_TOKEN_SECRET}
peoplemesh.consent-token.ttl-seconds=300
peoplemesh.session.secret=${SESSION_SECRET}
peoplemesh.oauth.state-secret=${OAUTH_STATE_SECRET}

# Search
peoplemesh.search.candidate-pool-size=100

# Matching
peoplemesh.matching.candidate-pool-size=100

# Auto-Community Clustering
peoplemesh.clustering.enabled=${CLUSTERING_ENABLED:false}
peoplemesh.clustering.k=20
peoplemesh.clustering.min-cluster-size=5
peoplemesh.clustering.max-centroid-distance=0.4

# Skills
peoplemesh.skills.match-threshold=0.80
peoplemesh.skills.reconciliation-threshold=0.75

# Retention
peoplemesh.retention.inactive-months=12

# Notifications
peoplemesh.notification.enabled=true
peoplemesh.notification.dry-run=true
peoplemesh.notification.subject-prefix=[PeopleMesh]

# Maintenance
peoplemesh.maintenance.api-key=${MAINTENANCE_API_KEY:}
peoplemesh.maintenance.allowed-cidrs=${MAINTENANCE_ALLOWED_CIDRS:}

# Entitlements — oauth_subject values granted specific entitlements on login
peoplemesh.entitlements.is-admin=${ENTITLEMENTS_IS_ADMIN}

# Organization — identity and legal details shown in Privacy Policy and Terms of Service
peoplemesh.organization.name=${ORGANIZATION_NAME:}
peoplemesh.organization.contact-email=${ORGANIZATION_CONTACT_EMAIL:}
peoplemesh.organization.dpo-name=${ORGANIZATION_DPO_NAME:}
peoplemesh.organization.dpo-email=${ORGANIZATION_DPO_EMAIL:}
peoplemesh.organization.data-location=${ORGANIZATION_DATA_LOCATION:}
peoplemesh.organization.governing-law=${ORGANIZATION_GOVERNING_LAW:}
