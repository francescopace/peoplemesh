# =============================================================================
# PeopleMesh — Application Configuration
# =============================================================================

quarkus.application.name=peoplemesh

# -----------------------------------------------------------------------------
# HTTP
# -----------------------------------------------------------------------------
quarkus.http.port=8080
quarkus.http.ssl-port=8443
quarkus.http.ssl.protocols=TLSv1.3
quarkus.http.cors.enabled=true

# -----------------------------------------------------------------------------
# Datasource — PostgreSQL
# -----------------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/peoplemesh}
%prod.quarkus.datasource.username=${DB_USER:peoplemesh}
%prod.quarkus.datasource.password=${DB_PASSWORD:changeme}

quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=identity,profiles,audit,jobs

# -----------------------------------------------------------------------------
# Redis
# -----------------------------------------------------------------------------
%prod.quarkus.redis.hosts=${REDIS_HOSTS:redis://localhost:6379}

# -----------------------------------------------------------------------------
# Vault
# -----------------------------------------------------------------------------
%prod.quarkus.vault.url=${VAULT_ADDR:http://localhost:8200}
%prod.quarkus.vault.authentication.client-token=${VAULT_TOKEN:}
%prod.quarkus.vault.devservices.enabled=false

# -----------------------------------------------------------------------------
# OIDC — Multi-tenant
# -----------------------------------------------------------------------------

# Default tenant: bearer token verification for MCP tools
quarkus.oidc.application-type=service
quarkus.oidc.token.issuer=any

# GitHub tenant
quarkus.oidc.github.provider=github
quarkus.oidc.github.application-type=service
quarkus.oidc.github.client-id=${OIDC_GITHUB_CLIENT_ID:}
quarkus.oidc.github.credentials.secret=${OIDC_GITHUB_CLIENT_SECRET:}

# Google tenant
quarkus.oidc.google.provider=google
quarkus.oidc.google.application-type=service
quarkus.oidc.google.client-id=${OIDC_GOOGLE_CLIENT_ID:}
quarkus.oidc.google.credentials.secret=${OIDC_GOOGLE_CLIENT_SECRET:}

# Microsoft tenant
quarkus.oidc.microsoft.provider=microsoft
quarkus.oidc.microsoft.application-type=service
quarkus.oidc.microsoft.client-id=${OIDC_MICROSOFT_CLIENT_ID:}
quarkus.oidc.microsoft.credentials.secret=${OIDC_MICROSOFT_CLIENT_SECRET:}

# MCP SSE endpoint requires authentication
quarkus.http.auth.permission.mcp-authenticated.paths=/mcp/*
quarkus.http.auth.permission.mcp-authenticated.policy=authenticated

# API endpoints require authentication
quarkus.http.auth.permission.api-authenticated.paths=/api/*
quarkus.http.auth.permission.api-authenticated.policy=authenticated

# Health and readiness are public
quarkus.http.auth.permission.public-health.paths=/q/health/*
quarkus.http.auth.permission.public-health.policy=permit

# -----------------------------------------------------------------------------
# MCP Server
# -----------------------------------------------------------------------------
quarkus.mcp-server.http.enabled=true

# -----------------------------------------------------------------------------
# PeopleMesh — Custom Configuration
# -----------------------------------------------------------------------------
peoplemesh.consent-token.secret=${CONSENT_TOKEN_SECRET:default-dev-secret-change-in-production-min-32-bytes!!}
peoplemesh.consent-token.ttl-seconds=300

peoplemesh.rate-limit.ip.max-requests=100
peoplemesh.rate-limit.ip.window-seconds=60
peoplemesh.rate-limit.user.max-requests=30
peoplemesh.rate-limit.user.window-seconds=60
peoplemesh.rate-limit.connections.max-per-day=10

peoplemesh.matching.candidate-pool-size=50
peoplemesh.matching.result-limit=20
peoplemesh.matching.decay-lambda=0.1

peoplemesh.retention.inactive-months=12
peoplemesh.retention.purge-days=30

peoplemesh.embedding.provider=${EMBEDDING_PROVIDER:noop}
peoplemesh.embedding.dimension=1536
peoplemesh.embedding.openai.api-key=${OPENAI_API_KEY}
peoplemesh.embedding.openai.model=text-embedding-3-small
peoplemesh.embedding.cohere.api-key=${COHERE_API_KEY}
peoplemesh.embedding.cohere.model=embed-english-v3.0

# -----------------------------------------------------------------------------
# Dev Services (active in dev/test only)
# -----------------------------------------------------------------------------
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.image-name=pgvector/pgvector:pg16
%dev.quarkus.redis.devservices.enabled=true
%dev.quarkus.vault.devservices.enabled=true
%dev.quarkus.vault.devservices.transit-enabled=true

%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.image-name=pgvector/pgvector:pg16
%test.quarkus.redis.devservices.enabled=true
%test.quarkus.vault.devservices.enabled=true
%test.quarkus.vault.devservices.transit-enabled=true

# Relax auth for dev/test mode
%dev.quarkus.http.auth.permission.mcp-authenticated.policy=permit
%dev.quarkus.http.auth.permission.api-authenticated.policy=permit
%test.quarkus.http.auth.permission.mcp-authenticated.policy=permit
%test.quarkus.http.auth.permission.api-authenticated.policy=permit
