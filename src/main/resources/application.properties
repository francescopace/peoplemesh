# =============================================================================
# PeopleMesh — Application Configuration
# =============================================================================

quarkus.application.name=peoplemesh

# Disable Netty binder to avoid duplicate gauge registration warning at startup.
quarkus.micrometer.binder.netty.enabled=false

# -----------------------------------------------------------------------------
# HTTP / SSL / CORS
# -----------------------------------------------------------------------------
quarkus.http.host=0.0.0.0
quarkus.http.port=8080
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:${quarkus.http.port}}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Accept,Authorization,X-Requested-With
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-allow-credentials=true

# -----------------------------------------------------------------------------
# MCP Server
# -----------------------------------------------------------------------------
quarkus.mcp-server.http.enabled=true

# -----------------------------------------------------------------------------
# Security
# -----------------------------------------------------------------------------
# Default tenant: bearer token verification for MCP tools
quarkus.oidc.tenant-enabled=false

# Login providers (OIDC — Multi-tenant)
peoplemesh.oidc.google.client-id=${OIDC_GOOGLE_CLIENT_ID:none}
peoplemesh.oidc.google.client-secret=${OIDC_GOOGLE_CLIENT_SECRET:none}
peoplemesh.oidc.microsoft.client-id=${OIDC_MICROSOFT_CLIENT_ID:none}
peoplemesh.oidc.microsoft.client-secret=${OIDC_MICROSOFT_CLIENT_SECRET:none}

# Import-only providers (credentials for profile import, not for login)
peoplemesh.oidc.github.client-id=${OIDC_GITHUB_CLIENT_ID:none}
peoplemesh.oidc.github.client-secret=${OIDC_GITHUB_CLIENT_SECRET:none}

# Authorization (HTTP auth permissions)
# MCP SSE endpoint requires authentication
quarkus.http.auth.permission.mcp-authenticated.paths=/mcp/*
quarkus.http.auth.permission.mcp-authenticated.policy=authenticated

# OAuth auth endpoints — public (no auth required)
quarkus.http.auth.permission.oauth-public.paths=/api/v1/auth/*
quarkus.http.auth.permission.oauth-public.policy=permit

# Maintenance endpoints — key-based auth, exempt from OIDC
quarkus.http.auth.permission.maintenance.paths=/api/v1/maintenance/*
quarkus.http.auth.permission.maintenance.policy=permit

# GET /api/v1/me — public at HTTP layer; method uses @PermitAll + optional session for current profile
quarkus.http.auth.permission.me-get-permit.paths=/api/v1/me
quarkus.http.auth.permission.me-get-permit.policy=permit
quarkus.http.auth.permission.me-get-permit.methods=GET
# Non-GET /api/v1/me must remain authenticated
quarkus.http.auth.permission.me-write-auth.paths=/api/v1/me
quarkus.http.auth.permission.me-write-auth.policy=authenticated
quarkus.http.auth.permission.me-write-auth.methods=POST,PUT,PATCH,DELETE

# Platform info endpoint — public (no auth required)
quarkus.http.auth.permission.info-public.paths=/api/v1/info
quarkus.http.auth.permission.info-public.policy=permit

# API endpoints require authentication (except paths already permitted above)
quarkus.http.auth.permission.api-authenticated.paths=/api/v1/*
quarkus.http.auth.permission.api-authenticated.policy=authenticated

# Health and readiness are public
quarkus.http.auth.permission.public-health.paths=/q/health/*
quarkus.http.auth.permission.public-health.policy=permit

# -----------------------------------------------------------------------------
# Datasource — PostgreSQL
# -----------------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.min-size=${DB_POOL_MIN_SIZE:4}
quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:24}
quarkus.datasource.jdbc.acquisition-timeout=${DB_POOL_ACQUIRE_TIMEOUT:30s}
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}

# Hibernate ORM
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.mapping.format.global=ignore
quarkus.hibernate-orm.jdbc.statement-batch-size=${HIBERNATE_BATCH_SIZE:32}
quarkus.hibernate-orm.jdbc.statement-fetch-size=${HIBERNATE_FETCH_SIZE:100}

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=identity,audit,mesh,skills
# Suppress noisy Flyway warnings when migration SQL re-creates existing schemas.
quarkus.log.category."org.flywaydb.core.internal.sqlscript.DefaultSqlScriptExecutor".level=ERROR

# -----------------------------------------------------------------------------
# LangChain4j
# -----------------------------------------------------------------------------
# Granite via Ollama
quarkus.langchain4j.chat-model.provider=ollama
quarkus.langchain4j.embedding-model.provider=ollama
quarkus.langchain4j.ollama.base-url=${OLLAMA_BASE_URL:http://ollama:11434}
quarkus.langchain4j.ollama.embedding-model.enabled=true
quarkus.langchain4j.ollama.embedding-model.model-id=${EMBEDDING_MODEL:granite-embedding:30m}
quarkus.langchain4j.ollama.chat-model.enabled=true
quarkus.langchain4j.ollama.chat-model.model-id=${LLM_MODEL:granite4:3b}
quarkus.langchain4j.ollama.chat-model.temperature=0.2
quarkus.langchain4j.ollama.chat-model.num-predict=2048
quarkus.langchain4j.ollama.chat-model.format=json
quarkus.langchain4j.ollama.timeout=60s

# OpenAI (alternative LLM provider)
