quarkus.datasource.devservices.image-name=pgvector/pgvector:pg16
quarkus.flyway.clean-at-start=true
quarkus.datasource.jdbc.acquisition-timeout=120
quarkus.datasource.jdbc.max-size=5

# Pin auth secrets for deterministic test runs
peoplemesh.session.secret=test-session-secret-32-chars-min-pad!
peoplemesh.consent-token.secret=test-consent-secret-32-chars-min-pad

# Ollama beans wired but no real calls and no devservice container
quarkus.langchain4j.ollama.chat-model.model-id=test-dummy
quarkus.langchain4j.ollama.embedding-model.model-id=test-dummy
quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.enable-integration=false
quarkus.langchain4j.ollama.devservices.enabled=false

# Disable OpenAI in tests
quarkus.langchain4j.openai.enable-integration=false
quarkus.langchain4j.openai.api-key=test-dummy-key

# OAuth state secret for tests
peoplemesh.oauth.state-secret=test-oauth-state-secret-32chars!

# Disable OIDC DevServices — PeopleMesh does not use Keycloak;
# without this Quarkus tries to start a Keycloak container in tests.
quarkus.oidc.devservices.enabled=false
