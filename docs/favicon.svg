<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- network-wired icon -->
  <g fill="#fff">
    <!-- top box (server/hub) -->
    <rect x="25" y="10" width="14" height="10" rx="2"/>
    <!-- vertical line from top box to horizontal bar -->
    <rect x="30.5" y="20" width="3" height="6"/>
    <!-- horizontal bar -->
    <rect x="10" y="26" width="44" height="5" rx="2"/>
    <!-- left vertical line -->
    <rect x="14.5" y="31" width="3" height="6"/>
    <!-- right vertical line -->
    <rect x="46.5" y="31" width="3" height="6"/>
    <!-- left bottom box -->
    <rect x="8" y="37" width="16" height="10" rx="2"/>
    <!-- right bottom box -->
    <rect x="40" y="37" width="16" height="10" rx="2"/>
    <!-- bottom-left vertical line -->
    <rect x="14.5" y="47" width="3" height="5"/>
    <!-- bottom-right vertical line -->
    <rect x="46.5" y="47" width="3" height="5"/>
    <!-- bottom-left terminal -->
    <rect x="8" y="52" width="16" height="4" rx="1"/>
    <!-- bottom-right terminal -->
    <rect x="40" y="52" width="16" height="4" rx="1"/>
  </g>
</svg>
